description: Symantec API access is bundled with Broadcom-issued enterprise security licenses (SEPM, SES, EDR, DLP); there is no published usage-based pricing or FOCUS-aligned export, so FinOps shape is approximated from license-bundle invoices.
sources:
  - https://www.broadcom.com/products/cybersecurity/endpoint
  - https://apidocs.symantec.com/
  - https://apidocs.securitycloud.symantec.com/
notes: Broadcom does not publish a usage-metered API pricing surface for Symantec products. Cost data must be reconciled from negotiated enterprise license invoices issued by Broadcom Inc.
billingModel:
  pricingCategory: Enterprise License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Symantec Enterprise Cloud
  ServiceCategory: Cybersecurity / Endpoint Security
  ProviderName: Symantec (Broadcom)
  PublisherName: Broadcom Inc.
  InvoiceIssuerName: Broadcom Inc.
  BillingCurrency: USD
meters:
  - name: endpoint_licenses
    description: Per-endpoint license counts for SEPM/SES (the primary commercial unit for endpoint protection).
    unit: endpoint
    aggregation: max
  - name: protected_data_volume
    description: Data volume protected by DLP / monitored channels - typical commercial unit for the DLP product line.
    unit: GB
    aggregation: max
  - name: edr_licensed_endpoints
    description: Endpoints under EDR coverage; commercial unit for the EDR product line.
    unit: endpoint
    aggregation: max
principles:
  - name: Visibility
    description: Cost visibility is on a per-license basis from Broadcom's commercial portal; the API surface itself is not separately metered or invoiced.
  - name: Allocation
    description: Allocate by product (SEPM/SES/EDR/DLP) and by managed endpoint count - the same units used on the Broadcom invoice.
  - name: Optimization
    description: Optimization levers are commercial - right-size endpoint counts, consolidate to the unified Symantec Enterprise Cloud bundle, and renegotiate at term boundaries.
  - name: Accountability
    description: Security/IT operations owns endpoint counts; procurement/legal owns the Broadcom contract; together they reconcile against the Broadcom invoice.
