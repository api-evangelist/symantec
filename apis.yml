- aid: symantec:ses-api
  name: Symantec Endpoint Security API
  description: The Symantec Endpoint Security (SES) REST API provides access to cloud-based endpoint security management including
    device inventory, threat events, incident management, and behavioral analytics. Requires OAuth 2.0 authentication. Documentation
    at apidocs.securitycloud.symantec.com.
  humanURL: https://apidocs.securitycloud.symantec.com/
