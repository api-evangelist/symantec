- aid: symantec:sepm-api
  name: Symantec Endpoint Protection Manager API
  description: The SEPM REST API enables programmatic access to Symantec Endpoint Protection Manager for managing computers,
    groups, policies, and server configuration. Requires OAuth 2.0 authentication via the SEPM identity endpoint. Base URL
    is https://{sepm-host}:8446/sepm/api/v1.
