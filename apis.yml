- aid: symantec:symantec-edr-api
  name: Symantec Endpoint Detection and Response API
  description: The Symantec EDR REST API enables programmatic access to endpoint detection and response capabilities including
    incident management, threat hunting, forensics, and entity queries. Uses OAuth 2.0 with client credentials grant type.
  humanURL: https://apidocs.symantec.com/home/SymantecEDR_4.2
