- aid: symantec:symantec-dlp-api
  name: Symantec Data Loss Prevention API
  description: The Symantec DLP REST API enables integration with the DLP Enforce platform for incident management, policy
    management, and data discovery. Supports retrieving incidents, updating remediation status, and managing DLP policies.
  humanURL: https://apidocs.symantec.com/home/DLP15.7
