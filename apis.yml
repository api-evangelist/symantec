aid: symantec
name: Symantec
description: Symantec (now part of Broadcom) is a leading enterprise cybersecurity company providing endpoint security, threat
  detection, data loss prevention, identity security, and network protection products. Symantec offers REST APIs for Endpoint
  Protection Manager (SEPM), Endpoint Security Cloud (SES), Endpoint Detection and Response (EDR), Data Loss Prevention (DLP),
  and the Integrated Cyber Defense Manager (ICDm) platform.
