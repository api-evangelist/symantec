description: Symantec is now part of Broadcom's enterprise cybersecurity portfolio. The SEPM, SES, EDR, and DLP REST APIs are bundled with paid product licenses; there is no public per-API pricing page. License terms (per-endpoint, per-user, per-volume) are negotiated through Broadcom Software sales and partners.
sources:
  - https://www.broadcom.com/products/cybersecurity/endpoint
  - https://apidocs.symantec.com/
  - https://apidocs.securitycloud.symantec.com/
notes: API access is included with paid Symantec Endpoint Security/Protection/EDR/DLP licenses. Broadcom does not publish per-API or per-call prices; pricing is contact-sales / channel-quoted.
plans:
  - id: symantec-contact-sales
    name: Contact Sales
    type: enterprise
    description: API access is included with the underlying Symantec product license (SEPM, SES, EDR, DLP). License pricing is set by Broadcom Software sales and channel partners and is not published.
    entries:
      - label: License-Bundled API Access
        name: license_bundled_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Symantec Endpoint Protection Manager API
      - name: Symantec Endpoint Security API
      - name: Symantec Endpoint Detection and Response API
      - name: Symantec Data Loss Prevention API
      - name: Bundled with Product License
