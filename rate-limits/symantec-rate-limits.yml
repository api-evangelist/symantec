specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Symantec
providerId: symantec
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Broadcom
  - Cybersecurity
  - Endpoint Security
  - Rate Limiting
description: Symantec's REST APIs (SEPM, SES, EDR, DLP) are documented through Broadcom TechDocs and apidocs.symantec.com but Broadcom does not publish standardized per-second/per-minute rate-limit numbers. SEPM is typically self-hosted, so throttling is governed by the customer's deployment; the cloud-managed SES, EDR, and DLP services apply internal limits but those numbers are not public.
sources:
  - https://apidocs.symantec.com/
  - https://apidocs.securitycloud.symantec.com/
  - https://techdocs.broadcom.com/us/en/symantec-security-software
notes: No published rate-limit numbers across the Symantec API portfolio. Self-hosted products (e.g. SEPM) are bound by the customer's infrastructure; cloud products throttle, but the thresholds are not public.
responseCodes:
  throttled: 429
limits:
  - name: Self-Hosted Throttling (SEPM, on-prem DLP)
    scope: deployment
    metric: varies
    limit: 'governed by customer deployment - not centrally published'
    notes: SEPM and on-prem DLP run in customer infrastructure; effective limits depend on local sizing.
  - name: Cloud-Managed Throttling (SES, EDR cloud)
    scope: tenant
    metric: varies
    limit: 'see Broadcom apidocs / TechDocs - numbers not publicly published'
    notes: Cloud-managed Symantec services apply internal throttling; specific thresholds are documented per customer in TechDocs / support cases.
policies:
  - name: OAuth 2.0 Auth
    description: All Symantec REST APIs (SEPM, SES, EDR, DLP) use OAuth 2.0 client-credentials flow; rate-limit scoping is generally per-token / per-tenant.
  - name: Reference Broadcom TechDocs
    description: Specific limits, retry guidance, and deprecation notices are kept in product-specific Broadcom TechDocs pages rather than a single rate-limit reference.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
