naftiko: 1.0.0-alpha2
info:
  label: Symantec Endpoint Protection Manager API — Groups
  description: 'Symantec Endpoint Protection Manager API — Groups. 3 operations. Lead operation: List Groups. Self-contained
    Naftiko capability covering one Symantec business surface.'
  tags:
  - Symantec
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYMANTEC_API_KEY: SYMANTEC_API_KEY
capability:
  consumes:
  - type: http
    namespace: sepm-groups
    baseUri: https://{sepm-host}:8446/sepm/api/v1
    description: Symantec Endpoint Protection Manager API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: List Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategroup
        method: POST
        description: Create Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-groupId
      path: /groups/{groupId}
      operations:
      - name: deletegroup
        method: DELETE
        description: Delete Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: Unique group identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.SYMANTEC_API_KEY}}'
  exposes:
  - type: rest
    namespace: sepm-groups-rest
    port: 8080
    description: REST adapter for Symantec Endpoint Protection Manager API — Groups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: listgroups
        description: List Groups
        call: sepm-groups.listgroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Create Group
        call: sepm-groups.creategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{groupid}
      name: groups-groupid
      description: REST surface for groups-groupId.
      operations:
      - method: DELETE
        name: deletegroup
        description: Delete Group
        call: sepm-groups.deletegroup
        with:
          groupId: rest.groupId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sepm-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Symantec Endpoint Protection Manager API — Groups. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-groups
      description: List Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sepm-groups.listgroups
      outputParameters:
      - type: object
        mapping: $.
    - name: create-group
      description: Create Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sepm-groups.creategroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-group
      description: Delete Group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sepm-groups.deletegroup
      with:
        groupId: tools.groupId
      outputParameters:
      - type: object
        mapping: $.
